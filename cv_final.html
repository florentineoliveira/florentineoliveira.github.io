    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>/* ‚îÄ‚îÄ Reset & Variables ‚îÄ‚îÄ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --ink: #1a1a2e;
    --paper: #f7f4ef;
    --accent: #dd0747;
    --accent-light: #fce4ec;
    --muted: #7a7060;
    --rule: #d8d0c4;
    --white: #ffffff;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
    background-color: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0;
}

/* ‚îÄ‚îÄ Top strip ‚îÄ‚îÄ */
.top-strip {
    background: var(--ink);
    color: var(--paper);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.6rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.top-strip span { opacity: 0.55; }

/* ‚îÄ‚îÄ Nav ‚îÄ‚îÄ */
nav {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--rule);
}

.nav-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: -0.01em;
}
.nav-name:hover { color: var(--accent); }

.nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
}

.nav-links a {
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--muted);
    transition: color 0.18s;
    font-weight: 400;
}
.nav-links a:hover,
.nav-links a.active {
    color: var(--accent);
}

/* ‚îÄ‚îÄ Page header ‚îÄ‚îÄ */
.page-header {
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 3rem 2rem;
    position: relative;
}
.page-header::before {
    content: '';
    display: block;
    width: 3px;
    height: 40px;
    background: var(--accent);
    position: absolute;
    left: 0;
    top: 3rem;
}

.page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 3vw, 2.6rem);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.01em;
    line-height: 1.15;
}

/* ‚îÄ‚îÄ Main content ‚îÄ‚îÄ */
main {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 3rem 4rem;
}

/* ‚îÄ‚îÄ Section headers ‚îÄ‚îÄ */
.section-label {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    margin-top: 2.5rem;
}
.section-label h2 {
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    white-space: nowrap;
}
.section-label::after {
    display: none;
}

/* ‚îÄ‚îÄ Pills ‚îÄ‚îÄ */
.pill {
    display: inline-flex;
    align-items: center;
    padding: 0.25rem 0.7rem;
    border-radius: 100px;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-decoration: none;
    transition: all 0.18s;
    white-space: nowrap;
}
.pill-solid {
    background: var(--ink);
    color: var(--paper);
}
.pill-solid:hover { background: var(--accent); color: white; }

.pill-outline {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--rule);
}
.pill-outline:hover { border-color: var(--accent); color: var(--accent); }

.pill-accent {
    background: var(--accent-light);
    color: var(--accent);
}
.pill-accent:hover { background: var(--accent); color: white; }

/* ‚îÄ‚îÄ Footer ‚îÄ‚îÄ */
footer {
    border-top: 1px solid var(--rule);
    padding: 1.5rem 3rem;
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
footer p {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
}

/* ‚îÄ‚îÄ Animations ‚îÄ‚îÄ */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
}
.fade-1 { animation: fadeUp 0.45s 0.05s ease both; }
.fade-2 { animation: fadeUp 0.45s 0.1s ease both; }
.fade-3 { animation: fadeUp 0.45s 0.15s ease both; }
.fade-4 { animation: fadeUp 0.45s 0.2s ease both; }
.fade-5 { animation: fadeUp 0.45s 0.25s ease both; }

/* ‚îÄ‚îÄ Responsive ‚îÄ‚îÄ */
@media (max-width: 640px) {
    .top-strip, nav, main, .page-header, footer {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
    }
    nav { flex-direction: column; gap: 1rem; align-items: flex-start; }
    .nav-links { gap: 1.2rem; }
}
</style>
    <style>
        .cv-actions {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .cv-frame-wrap {
            border: 1px solid var(--rule);
            background: white;
            overflow: hidden;
        }

        .cv-frame-wrap iframe {
            width: 100%;
            height: 82vh;
            display: block;
            border: none;
        }

        .cv-fallback {
            padding: 3rem;
            text-align: center;
        }
        .cv-fallback p {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>


    <nav>
        <a class="nav-name" href="index.html">Florentine Oliveira-Roux</a>
        <ul class="nav-links">
            <li><a href="index.html">About</a></li>
            <li><a href="research.html">Research</a></li>
            <li><a href="teaching.html">Teaching</a></li>
            <li><a href="cv.html" class="active">CV</a></li>
        </ul>
    </nav>

    <div class="page-header fade-1">
        <h1>CV</h1>
    </div>

    <main>
        <div class="cv-actions fade-2">
            <a class="pill pill-solid" href="assets/pdf/cv.pdf" target="_blank">‚Üì Download PDF</a>
            <a class="pill pill-outline" href="assets/pdf/cv.pdf" target="_blank">Open in new tab</a>
        </div>

        <div class="cv-frame-wrap fade-3">
            <iframe src="assets/pdf/cv.pdf" title="Curriculum Vitae">
                <div class="cv-fallback">
                    <p>Your browser doesn't support inline PDFs.</p>
                    <a class="pill pill-solid" href="assets/pdf/cv.pdf" download>Download CV</a>
                </div>
            </iframe>
        </div>
    </main>


</body>
